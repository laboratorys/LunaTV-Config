name: Build Rules JSON

on:
  push:
    branches: [main]
    paths:
      - "rules/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Process TS Files
        run: node build-rules.js

      - name: Deploy to Dist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/rules.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update rules.json" && git push)
